<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.3);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)" />
  
  <!-- Main code brackets with CQ text -->
  <g filter="url(#glow)">
    <path d="M 50 235L 40 256 L 50 277" 
          stroke="white" 
          stroke-width="10" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          opacity="0.4" />
    
    <path d="M 462 235 L 472 256 L 462 277" 
          stroke="white" 
          stroke-width="12" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          opacity="0.4" />
    
    <text x="256" y="335" 
          font-family="'Arial Rounded MT'" 
          font-size="220" 
          font-weight="400" 
          text-anchor="middle" 
          fill="white"
          letter-spacing="2"
          opacity="0.98">CQ</text>
  </g>
  
  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#shineGrad)" opacity="0.4">
    <animateTransform
      attributeName="transform"
      type="translate"
      from="-512 0"
      to="512 0"
      dur="3s"
      repeatCount="indefinite" />
  </rect>
</svg>